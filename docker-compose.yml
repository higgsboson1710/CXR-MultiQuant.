version: '3.8'

services:
  db:
    image: postgres:15
    container_name: cxr_postgres
    restart: always
    environment:
      POSTGRES_USER: cxr_user
      POSTGRES_PASSWORD: cxr_password
      POSTGRES_DB: cxr_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: cxr_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cxr.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
